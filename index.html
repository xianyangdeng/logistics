<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流运费查询系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 20px; }
        .container { max-width: 950px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 30px; color: #333; }
        .result-table th { text-align: center; vertical-align: middle; }
        .result-table td { vertical-align: middle; }
        .loading { color: #6c757d; font-style: italic; }
    </style>
</head>
<body>
<div class="container">
    <h1 class="text-center">物流运费查询系统</h1>

    <!-- 状态提示 -->
    <div id="statusAlert" class="alert alert-info">正在加载价格数据，请稍候...</div>

    <!-- 查询表单 -->
    <form id="queryForm" class="p-4 border rounded bg-light" style="display:none;">
        <h5 class="mb-3">填写询价信息</h5>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">国家/路向</label>
                <input type="text" class="form-control" id="country" placeholder="例如：美国" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">类型</label>
                <select class="form-select" id="type">
                    <option value="文件">文件</option>
                    <option value="物品">物品</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">是否带电</label>
                <select class="form-select" id="battery">
                    <option value="否">否</option>
                    <option value="是">是</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">实际重量 (g)</label>
                <input type="number" class="form-control" id="weight" placeholder="克" value="1000" required>
            </div>
        </div>
        <div class="mt-4 text-center">
            <button type="submit" class="btn btn-primary px-5">查询报价</button>
        </div>
    </form>

    <hr class="my-5">

    <!-- 结果展示 -->
    <h4>查询结果</h4>
    <div class="table-responsive">
        <table class="table table-striped table-hover result-table mt-3">
            <thead class="table-primary">
                <tr>
                    <th>渠道</th>
                    <th>计费重/首重</th>
                    <th>国家/分区</th>
                    <th>预估运费</th>
                    <th>时效</th>
                    <th>备注</th>
                </tr>
            </thead>
            <tbody id="resultBody">
                <tr><td colspan="6" class="text-center text-muted">请在上方输入信息并查询</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // --- 数据存储 ---
    let table1Data = [];
    let table2Data = [];
    let table3Data = [];
    let table4Data = [];
    let isDataLoaded = false;

    // --- 工具函数：CSV 解析 ---
    // 简单的 CSV 解析器，处理逗号分隔，去除首尾空格
    function parseCSV(text) {
        return text.split('\n').map(line => {
            // 过滤掉空行
            if (!line.trim()) return null;
            // 分割并去除每个单元格的首尾空格
            return line.split(',').map(cell => cell.trim());
        }).filter(row => row !== null);
    }

    // --- 数据加载 ---
    async function loadData() {
        try {
            // 并行加载所有文件
            const [res1, res2, res3, res4] = await Promise.all([
                fetch('table1.csv'),
                fetch('table2.csv'),
                fetch('table3.csv'),
                fetch('table4.csv')
            ]);

            if (!res1.ok || !res2.ok || !res3.ok || !res4.ok) throw new Error("文件加载失败");

            const text1 = await res1.text();
            const text2 = await res2.text();
            const text3 = await res3.text();
            const text4 = await res4.text();

            table1Data = parseCSV(text1);
            table2Data = parseCSV(text2);
            table3Data = parseCSV(text3);
            table4Data = parseCSV(text4);

            isDataLoaded = true;
            document.getElementById('statusAlert').className = 'alert alert-success';
            document.getElementById('statusAlert').innerHTML = '✅ 所有价格数据已加载完毕，您可以直接开始询价！';
            document.getElementById('queryForm').style.display = 'block';

        } catch (error) {
            console.error(error);
            document.getElementById('statusAlert').className = 'alert alert-danger';
            document.getElementById('statusAlert').innerHTML = '❌ 数据加载失败，请检查 table1-4.csv 文件是否存在。';
        }
    }

    // --- 核心查询逻辑 ---
    document.getElementById('queryForm').addEventListener('submit', function(e) {
        e.preventDefault();
        if (!isDataLoaded) return;

        // 1. 获取输入
        let countryInput = document.getElementById('country').value.trim();
        const typeInput = document.getElementById('type').value; // "文件" 或 "物品"
        const batteryInput = document.getElementById('battery').value; // "是" 或 "否"
        const weightInput = parseFloat(document.getElementById('weight').value);

        // 清空旧结果
        const resultBody = document.getElementById('resultBody');
        resultBody.innerHTML = '';

        // 辅助函数：添加结果行
        function addResult(channel, weightInfo, zoneInfo, price, time, remark) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${channel}</td>
                <td>${weightInfo}</td>
                <td>${zoneInfo}</td>
                <td class="fw-bold text-danger">${price}</td>
                <td>${time}</td>
                <td>${remark}</td>
            `;
            resultBody.appendChild(tr);
        }

        let foundAnything = false;

        // ==========================
        // 逻辑 A: 查询 Table 1 (直接匹配国家)
        // ==========================
        // 假设表头: 路向, 首重, 续重, 时效, 备注 (根据你的描述调整)
        // 这里我们遍历每一行，看第一列（路向）是否包含输入的国家名
        table1Data.slice(1).forEach(row => {
            // 防御性编程：确保行数据存在
            if (!row || row.length < 2) return;

            const routeName = row[0]; // 第一列是路向
            // 包含匹配（例如输入"美国"，匹配"美国-纽约"）
            if (routeName.includes(countryInput)) {
                const price = row[1] || '0'; // 假设第二列是价格或首重价
                const time = row[3] || '-';
                const remark = row[4] || '';
                addResult(routeName, '首重价', countryInput, price, time, remark);
                foundAnything = true;
            }
        });

        // ==========================
        // 逻辑 B: 查询 Table 2 (获取分区)
        // ==========================
        let zone = null;
        // 遍历 Table 2，寻找国家
        table2Data.slice(1).forEach(row => {
            if (!row || row.length < 2) return;
            // 假设 Table 2 结构：第1列是路向/国家，第2列是分区
            // 注意：这里也要 trim()，因为 CSV 经常有看不见的空格
            const countryInTable = row[0].trim();
            if (countryInTable === countryInput) {
                zone = row[1].trim(); // 获取分区，例如 "1" 或 "A"
            }
        });

        if (!zone) {
            // 如果 Table 1 也没找到，才报错（因为 Table 1 不需要分区）
            if (!foundAnything) {
                resultBody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">❌ 未在 Table 2 中找到 "${countryInput}" 的分区信息，请检查国家名称是否拼写正确。</td></tr>`;
            }
            return; // 没有分区，后面的 Table 3/4 无法查询
        }

        // ==========================
        // 逻辑 C: 查询 Table 3 (一口价，分区在列头)
        // 表头: 渠道, 是否文件, 是否带电, 重量, [1, A, B...]
        // ==========================
        table3Data.slice(1).forEach(row => {
            if (!row || row.length < 5) return;

            const channel = row[0];
            const reqType = row[1]; // "文件" 或 "物品"
            const reqBattery = row[2]; // "是" 或 "否"
            const maxWeight = parseFloat(row[3]); // 限制重量

            // 1. 基础条件校验
            if (typeInput !== reqType) return;
            if (batteryInput !== reqBattery) return;
            if (weightInput > maxWeight) return; // 超重

            // 2. 寻找分区列
            // 你的描述：第 1 行第 5 列开始是分区号 (索引为 4)
            // 我们在表头（table3Data[0]）里找这个分区
            // 注意：table3Data[0] 是表头数组
            const zoneColumnIndex = table3Data[0].indexOf(zone);

            // 如果表头里找不到这个分区，或者分区列在当前行没有数据，跳过
            if (zoneColumnIndex === -1 || zoneColumnIndex >= row.length) return;

            const price = row[zoneColumnIndex];
            if (!price) return; // 该分区无价格

            const remark = row[row.length - 1] || ''; // 最后一列是备注
            addResult(channel, `限重${maxWeight}g`, `${countryInput} (${zone})`, price, '-', remark);
            foundAnything = true;
        });

        // ==========================
        // 逻辑 D: 查询 Table 4 (单价，分区在列头)
        // 表头: 渠道, 是否文件, 是否带电, 起始重量, 结束重量, [1, A, B...]
        // ==========================
        table4Data.slice(1).forEach(row => {
            if (!row || row.length < 6) return;

            const channel = row[0];
            const reqType = row[1];
            const reqBattery = row[2];
            const minW = parseFloat(row[3]);
            const maxW = parseFloat(row[4]);

            // 1. 基础条件校验
            if (typeInput !== reqType) return;
            if (batteryInput !== reqBattery) return;
            // 重量必须在 起始 和 结束 之间
            if (weightInput < minW || weightInput > maxW) return;

            // 2. 寻找分区列
            // 你的描述：第 1 行第 6 列开始是分区号 (索引为 5)
            const zoneColumnIndex = table3Data[0].indexOf(zone); // 注意：Table 3 和 4 的表头分区列结构通常一致，这里为了保险用 table3Data[0] 查找，或者你可以改成 table4Data[0]

            // 修正：应该用 table4Data 的表头查找
            const t4ZoneColIndex = table4Data[0].indexOf(zone);

            if (t4ZoneColIndex === -1 || t4ZoneColIndex >= row.length) return;

            const price = row[t4ZoneColIndex];
            if (!price) return;

            const remark = row[row.length - 1] || '';
            // 显示单价
            addResult(channel, `${minW}-${maxW}g`, `${countryInput} (${zone})`, `${price} (单价)`, '-', remark);
            foundAnything = true;
        });

        if (!foundAnything) {
            resultBody.innerHTML = `<tr><td colspan="6" class="text-center text-muted">未找到匹配的价格方案。请检查：1. 国家是否在 Table 2 中；2. 重量/类型/带电属性是否符合 Table 3/4 的限制。</td></tr>`;
        }
    });

    // 初始化加载
    loadData();
</script>
</body>
</html>
