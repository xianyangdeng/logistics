<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国际物流运费查询系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { color: #2c3e50; text-align: center; }
        .form-container { background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, button { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #3498db; color: white; cursor: pointer; font-size: 16px; margin-top: 20px; }
        button:hover { background-color: #2980b9; }
        #results { margin-top: 20px; }
        .result-item { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 10px; background: #fff; }
        .result-item h3 { margin-top: 0; color: #2c3e50; }
        .price { font-size: 1.2em; font-weight: bold; color: #e74c3c; }
        .loading { color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>

    <h1>📦 国际物流运费查询</h1>
    
    <div class="form-container">
        <label for="country">国家:</label>
        <input type="text" id="country" placeholder="输入国家名称，如：美国、日本">

        <label for="weight">重量 (kg):</label>
        <input type="number" id="weight" step="0.01" min="0" placeholder="例如: 1.5">

        <label for="type">类型:</label>
        <select id="type">
            <option value="物品">物品</option>
            <option value="文件">文件</option>
        </select>

        <label for="power">是否带电:</label>
        <select id="power">
            <option value="否">否</option>
            <option value="是">是</option>
        </select>

        <label for="length">包裹尺寸 - 长 (cm):</label>
        <input type="number" id="length" step="0.1" min="0" placeholder="长">

        <label for="width">宽 (cm):</label>
        <input type="number" id="width" step="0.1" min="0" placeholder="宽">

        <label for="height">高 (cm):</label>
        <input type="number" id="height" step="0.1" min="0" placeholder="高">

        <button onclick="queryRates()">🔍 查询运费</button>
    </div>

    <div id="results">请输入信息并点击查询以获取报价。</div>

    <script>
        // 全局变量存储CSV数据
        let table1Data = null;
        let table2Data = null;
        let table3Data = null;
        let table4Data = null;

        // 页面加载时读取CSV
        window.onload = function() {
            Promise.all([
                fetch('table1.csv').then(r => r.text()).then(data => { table1Data = Papa.parse(data, {header: true}).data; }),
                fetch('table2.csv').then(r => r.text()).then(data => { table2Data = Papa.parse(data, {header: true}).data; }),
                fetch('table3.csv').then(r => r.text()).then(data => { table3Data = Papa.parse(data, {header: true}).data; }),
                fetch('table4.csv').then(r => r.text()).then(data => { table4Data = Papa.parse(data, {header: true}).data; })
            ]).then(() => {
                console.log("所有数据加载完成");
            }).catch(err => {
                console.error('数据加载失败:', err);
                document.getElementById('results').innerHTML = "<p style='color:red'>数据文件加载失败，请检查CSV文件路径。</p>";
            });
        };

        function queryRates() {
            const country = document.getElementById('country').value.trim();
            const weightKg = parseFloat(document.getElementById('weight').value);
            const type = document.getElementById('type').value;
            const power = document.getElementById('power').value;
            const length = parseFloat(document.getElementById('length').value) || 0;
            const width = parseFloat(document.getElementById('width').value) || 0;
            const height = parseFloat(document.getElementById('height').value) || 0;

            if (!country || isNaN(weightKg)) {
                alert("请填写完整的国家和重量信息！");
                return;
            }

            let results = [];
            document.getElementById('results').innerHTML = "<p class='loading'>正在计算报价...</p>";

            // 模拟异步加载完成后的处理
            setTimeout(() => {
                try {
                    // --- 逻辑1: 处理 Table1 (标准EMS, e特快等) ---
                    if (table1Data) {
                        table1Data.forEach(row => {
                            if (row.路向 === country && row.文件_物品 === type && row.是否带电 === power) {
                                let weightG = weightKg * 1000;
                                let fee = parseFloat(row.处理费) || 0;
                                let firstWeight = parseFloat(row.首重_g_) || 0;
                                let firstPrice = parseFloat(row.首重资费) || 0;
                                let contWeight = parseFloat(row.续重_g_) || 1;
                                let contPrice = parseFloat(row.续重资费) || 0;

                                // 计算公式：处理费+向上取整（（重量*1000-首重）/续重）*续重资费+首重资费
                                let excessWeight = Math.max(0, weightG - firstWeight);
                                let contCount = Math.ceil(excessWeight / contWeight);
                                let totalPrice = fee + firstPrice + (contCount * contPrice);

                                results.push({
                                    channel: row.渠道,
                                    price: totalPrice.toFixed(2),
                                    remark: row.备注 || "无",
                                    source: "Table1"
                                });
                            }
                        });
                    }

                    // --- 逻辑2 & 3: 处理 Table2, Table3, Table4 (中速联邦系列) ---
                    let zoneCode = null;
                    if (table2Data) {
                        const countryRow = table2Data.find(row => row.国家 === country);
                        if (countryRow) {
                            zoneCode = countryRow.分区;
                        }
                    }

                    if (zoneCode && table3Data) {
                        // 获取表头映射 (Table3 第1行 5-30列对应 A-Z)
                        const headers = Object.keys(table3Data[0]);
                        const zoneColIndex = headers.indexOf(zoneCode); // 找到分区代码对应的列索引

                        if (zoneColIndex > -1) {
                            // 逻辑3: Table3 处理 (重量为0.5的倍数取整)
                            const weight05 = Math.ceil(weightKg * 2) / 2; // 向上0.5取整
                            table3Data.forEach(row => {
                                if (row.是否文件 === type && 
                                    row.是否带电 === power && 
                                    parseFloat(row.重量) === weight05) {
                                    
                                    const price = row[headers[zoneColIndex]];
                                    if (price && !isNaN(price)) {
                                        results.push({
                                            channel: row.渠道,
                                            price: price,
                                            remark: row.备注 || "无",
                                            source: "Table3"
                                        });
                                    }
                                }
                            });
                        }
                    }

                    if (zoneCode && table4Data) {
                        // 获取表头映射 (Table4 第1行 6-31列对应 A-Z)
                        const headers = Object.keys(table4Data[0]);
                        const zoneColIndex = headers.indexOf(zoneCode); 

                        if (zoneColIndex > -1) {
                            // 逻辑4: Table4 处理 (重量区间匹配)
                            const weight1 = Math.ceil(weightKg); // 向上1取整
                            table4Data.forEach(row => {
                                const startWeight = parseInt(row.起始重量);
                                const endWeight = parseInt(row.结束重量);
                                if (row.是否文件 === type && 
                                    row.是否带电 === power && 
                                    weight1 >= startWeight && 
                                    weight1 <= endWeight) {
                                    
                                    const basePrice = row[headers[zoneColIndex]];
                                    if (basePrice && !isNaN(basePrice)) {
                                        // 价格 * 向上1取整(重量)
                                        const totalPrice = (parseFloat(basePrice) * weight1).toFixed(2);
                                        results.push({
                                            channel: row.渠道,
                                            price: totalPrice,
                                            remark: row.备注 || "无",
                                            source: "Table4"
                                        });
                                    }
                                }
                            });
                        }
                    }

                    // 显示结果
                    displayResults(results);
                } catch (e) {
                    console.error(e);
                    document.getElementById('results').innerHTML = "<p style='color:red'>计算过程中发生错误: " + e.message + "</p>";
                }
            }, 100);
        }

        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            if (results.length === 0) {
                resultsDiv.innerHTML = "<p>未找到符合条件的报价。请检查输入的国家或参数是否正确。</p>";
                return;
            }

            let html = `<p>共找到 ${results.length} 个报价方案：</p>`;
            results.forEach(res => {
                html += `
                <div class="result-item">
                    <h3>${res.channel}</h3>
                    <p><strong>运费:</strong> <span class="price">¥${res.price}</span></p>
                    <p><strong>备注:</strong> ${res.remark}</p>
                </div>
                `;
            });
            resultsDiv.innerHTML = html;
        }
    </script>
</body>
</html>
