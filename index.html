<script>
    // 全局变量存储数据
    let table1Data = [];
    let table2Data = [];
    let table3Data = [];
    let table4Data = [];

    // 加载CSV函数
    async function loadCSV(url, variable) {
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const text = await response.text();
            // 简单的CSV解析（假设没有复杂的引号嵌套）
            const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            const headers = lines[0].split(',').map(h => h.trim());

            const data = lines.slice(1).map(line => {
                const values = line.split(',').map(v => v.trim());
                let obj = {};
                headers.forEach((h, i) => {
                    obj[h] = values[i];
                });
                return obj;
            });

            // 赋值给对应的全局变量
            if (variable === 'table1') table1Data = data;
            if (variable === 'table2') table2Data = data;
            if (variable === 'table3') table3Data = data;
            if (variable === 'table4') table4Data = data;

            console.log(`${url} 自动加载成功!`);
        } catch (error) {
            console.error(`加载 ${url} 失败:`, error);
        }
    }

    // 初始化加载所有表格
    async function init() {
        await Promise.all([
            loadCSV('data/table1.csv', 'table1'),
            loadCSV('data/table2.csv', 'table2'),
            loadCSV('data/table3.csv', 'table3'),
            loadCSV('data/table4.csv', 'table4')
        ]);
    }

    // 核心计算函数
    function calculatePrice() {
        if (table1Data.length === 0) {
            alert("数据正在加载中，请稍后...");
            return;
        }

        // 1. 获取表单输入
        const country = document.getElementById('country').value;
        const type = document.getElementById('type').value; // 文件 或 物品
        const weight = parseFloat(document.getElementById('weight').value);
        const length = parseFloat(document.getElementById('length').value);
        const width = parseFloat(document.getElementById('width').value);
        const height = parseFloat(document.getElementById('height').value);

        if (!country || isNaN(weight) || weight <= 0) {
            alert("请填写完整的国家、重量信息！");
            return;
        }

        // 2. 计算体积重 (如果是物品)
        let volumetricWeight = 0;
        if (type === '物品' && length && width && height) {
            volumetricWeight = (length * width * height) / 5000;
        }
        const finalWeight = Math.max(weight, volumetricWeight);
        const firstWeight = 0.5; // 首重 0.5kg
        const unitWeight = 0.5;  // 续重单位 0.5kg

        let resultHTML = `<h3>查询结果：${country} - ${type}</h3>`;
        let foundAny = false;

        // ==========================================
        // 步骤 A: 查找分区 (为了 Table 3 和 4 使用)
        // ==========================================
        let zone = null;
        // 在 table2 中查找该国家对应的分区
        const zoneRow = table2Data.find(row => row['国家'] === country);
        if (zoneRow) {
            // 假设 table2 的结构是：国家 | 分区
            // 注意：这里需要根据你 table2 实际的表头来写，假设表头叫 "分区"
            zone = zoneRow['分区'];
        }

        // ==========================================
        // 步骤 B: 处理 Table 1 (直接匹配国家)
        // ==========================================
        // 筛选 Table 1 中符合国家 和 类型 的行
        const t1Rows = table1Data.filter(row => row['路向'] === country && row['文件/物品'] === type);

        if (t1Rows.length > 0) {
            // 找到匹配的行后，我们需要找到对应重量段的价格
            // 假设 Table 1 的结构是：路向 | 文件/物品 | 0.5kg | 1kg | 1.5kg ...
            // 我们需要找到大于等于 finalWeight 的最小列

            // 获取所有重量表头 (跳过前两个字段)
            const weightHeaders = Object.keys(t1Rows[0]).slice(2);

            // 找到匹配的列名 (例如 "1.5kg")
            let matchedHeader = weightHeaders.find(h => {
                // 提取数字，例如 "1.5kg" -> 1.5
                const limit = parseFloat(h);
                return finalWeight <= limit;
            });

            if (matchedHeader) {
                const price = t1Rows[0][matchedHeader];
                resultHTML += `<p><strong>Table 1 价格:</strong> ${price} 元 (基于 ${matchedHeader})</p>`;
                foundAny = true;
            } else {
                resultHTML += `<p><strong>Table 1:</strong> 重量超出价格表范围</p>`;
            }
        }

        // ==========================================
        // 步骤 C: 处理 Table 3 (一口价 - 文件)
        // ==========================================
        if (type === '文件' && table3Data.length > 0 && zone) {
            // 在 Table 3 中查找 分区 等于 zone 的行
            const t3Row = table3Data.find(row => row['分区'] === zone);
            if (t3Row) {
                const price = t3Row['价格']; // 假设 Table 3 只有一列价格
                resultHTML += `<p><strong>Table 3 一口价:</strong> ${price} 元</p>`;
                foundAny = true;
            }
        }

        // ==========================================
        // 步骤 D: 处理 Table 4 (一口价 - 物品)
        // ==========================================
        if (type === '物品' && table4Data.length > 0 && zone) {
            // 在 Table 4 中查找 分区 等于 zone 的行
            const t4Row = table4Data.find(row => row['分区'] === zone);
            if (t4Row) {
                const price = t4Row['价格'];
                resultHTML += `<p><strong>Table 4 一口价:</strong> ${price} 元</p>`;
                foundAny = true;
            }
        }

        if (!foundAny) {
            resultHTML += `<p>未找到匹配的价格信息，请检查国家是否在分区表中，或数据格式是否正确。</p>`;
        }

        document.getElementById('result').innerHTML = resultHTML;
    }

    // 启动加载
    init();
</script>
