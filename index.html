<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中山国际物流询价</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.4;
            padding: 8px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* 水印样式 */
        .watermark {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.36; /* 透明度87% */
            transform: rotate(45deg);
            transform-origin: center;
            font-size: 50px;
            font-weight: bold;
            color: #cccccc;
            display: flex;
            justify-content: center;
            align-items: center;
            white-space: nowrap;
        }
        
        .container {
            max-width: 100%;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }
        
        header {
            background: linear-gradient(135deg, #1a6dcc 0%, #2c9ce0 100%);
            color: white;
            padding: 12px;
            text-align: center;
        }
        
        h1 {
            font-size: 18px;
            margin-bottom: 4px;
            font-weight: 600;
        }
        
        .subtitle {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .content {
            padding: 12px;
        }
        
        .form-group {
            margin-bottom: 12px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #444;
            font-size: 13px;
        }
        
        input, select {
            width: 100%;
            padding: 10px 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            background-color: #fff;
            -webkit-appearance: none;
        }
        
        .dimensions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        
        .dimensions input {
            text-align: center;
        }
        
        .checkbox-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
            padding: 8px 0;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .checkbox-item input[type="checkbox"] {
            position: relative;
            width: 22px;
            height: 22px;
            margin: 0;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-color: #fff;
            border: 2px solid #ddd;
            border-radius: 4px;
            transition: all 0.2s;
        }
        
        .checkbox-item input[type="checkbox"]:checked {
            background-color: #1a6dcc;
            border-color: #1a6dcc;
        }
        
        .checkbox-item input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
        }
        
        .checkbox-item label {
            margin-bottom: 0;
            font-weight: normal;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
            color: #333;
        }
        
        button {
            background: linear-gradient(135deg, #1a6dcc 0%, #2c9ce0 100%);
            color: white;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: all 0.2s;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .loading {
            text-align: center;
            padding: 15px;
            color: #666;
            display: none;
        }
        
        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 3px solid #2c9ce0;
            width: 25px;
            height: 25px;
            animation: spin 1s linear infinite;
            margin: 0 auto 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .results-container {
            margin-top: 12px;
        }
        
        .result-card {
            background-color: #fff;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
            border-left: 3px solid #2c9ce0;
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            padding-bottom: 6px;
            border-bottom: 1px dashed #eee;
        }
        
        .channel-name {
            font-weight: 600;
            font-size: 14px;
            color: #1a6dcc;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .price {
            font-weight: 700;
            font-size: 16px;
            color: #e74c3c;
            margin-left: 8px;
        }
        
        .result-details {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            font-size: 11px;
        }
        
        .detail-item {
            width: calc(50% - 2px);
            padding: 2px 0;
            display: flex;
            justify-content: space-between;
        }
        
        .detail-label {
            color: #777;
            font-size: 11px;
        }
        
        .detail-value {
            font-weight: 600;
            color: #333;
            text-align: right;
            max-width: 70%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .no-discount {
            color: #999;
            font-style: italic;
        }
        
        .no-results {
            text-align: center;
            padding: 20px 10px;
            color: #888;
            font-size: 13px;
        }
        
        /* 隐藏data-status和debug-info */
        .data-status, .debug-info {
            display: none !important;
        }
        
        footer {
            text-align: center;
            padding: 8px;
            color: #777;
            font-size: 11px;
            border-top: 1px solid #eee;
            margin-top: 8px;
        }
        
        /* 移动端优化 */
        @media (max-width: 480px) {
            body {
                padding: 5px;
            }
            
            .container {
                border-radius: 8px;
            }
            
            header {
                padding: 10px;
            }
            
            h1 {
                font-size: 16px;
            }
            
            .content {
                padding: 10px;
            }
            
            .form-group {
                margin-bottom: 10px;
            }
            
            .checkbox-group {
                gap: 12px;
            }
            
            .checkbox-item input[type="checkbox"] {
                width: 20px;
                height: 20px;
            }
            
            .result-details {
                gap: 3px;
            }
            
            .detail-item {
                width: calc(50% - 1.5px);
            }
        }
    </style>
</head>
<body>
    <!-- 水印 -->
    <div class="watermark" id="watermark"></div>
    
    <div class="container">
        <header>
            <h1>中山国际物流询价</h1>
            <p class="subtitle">输入货物信息，获取最优报价</p>
        </header>
        
        <div class="content">
            <div class="data-status">
                📁 数据维护：请确保同目录下有 table1.csv, table2.csv, table3.csv, table4.csv
            </div>
            
            <div class="form-group">
                <label for="country">目的国家/地区</label>
                <input type="text" id="country" list="countryList" placeholder="输入国家或选择">
                <datalist id="countryList"></datalist>
            </div>
            
            <div class="form-group">
                <label for="weight">重量 (kg)</label>
                <input type="number" id="weight" min="0.1" step="0.1" placeholder="例如：2.5" value="1">
            </div>
            
            <div class="form-group">
                <label>货物属性</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="isFile">
                        <label for="isFile">文件</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="isElectric">
                        <label for="isElectric">带电</label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label>尺寸 (cm) - 留空或填0则忽略尺寸</label>
                <div class="dimensions">
                    <input type="number" id="length" min="0" placeholder="长" value="0">
                    <input type="number" id="width" min="0" placeholder="宽" value="0">
                    <input type="number" id="height" min="0" placeholder="高" value="0">
                </div>
            </div>
            
            <button id="queryBtn">查询报价</button>
            
            <div class="debug-info">
                <h3>🔍 调试信息</h3>
                <p>• 打开开发者工具(F12)查看匹配过程</p>
                <p>• table3/table4：强制计泡(÷5000)，用计费重匹配</p>
                <p>• 尺寸为0时：忽略尺寸及体积因素</p>
                <p>• 营销费：table2中"营销费"列，不足1kg按1kg算</p>
            </div>
        </div>
        
        <div class="loading" id="loadingIndicator">
            <div class="spinner"></div>
            <p>计算中...</p>
        </div>
        
        <div class="results-container" id="resultsContainer">
            <div class="no-results">
                请输入货物信息并点击查询
            </div>
        </div>
        
        <footer>
            <p>© 2026 物流询价系统 | 数据仅供参考</p>
        </footer>
    </div>

    <script>
        // ==================== 全局变量 ====================
        let table1Data = [];
        let table2Data = [];
        let table3Data = [];
        let table4Data = [];
        let allCountries = [];
        
        // ==================== 设置水印 ====================
        function setWatermark() {
            const watermarkElement = document.getElementById('watermark');
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const dateStr = `${year}-${month}-${day}`;
            
            watermarkElement.textContent = dateStr;
            console.log(`🎨 设置水印: ${dateStr}, 透明度: 87%`);
        }
        
        // ==================== CSV加载函数 ====================
        async function loadCSVFiles() {
            console.log('📂 加载CSV文件...');
            
            try {
                const [t1, t2, t3, t4] = await Promise.all([
                    fetch('table1.csv').then(res => res.text()),
                    fetch('table2.csv').then(res => res.text()),
                    fetch('table3.csv').then(res => res.text()),
                    fetch('table4.csv').then(res => res.text())
                ]);
                
                table1Data = parseCSV(t1);
                table2Data = parseCSV(t2);
                table3Data = parseCSV(t3);
                table4Data = parseCSV(t4);
                
                allCountries = [...new Set(table2Data.map(row => row['国家']))].sort();
                
                console.log('✅ CSV加载成功！');
                console.log('📊 table2数据示例:', table2Data.slice(0, 3));
                populateCountryList();
                
            } catch (error) {
                console.error('❌ 加载失败:', error);
                document.getElementById('resultsContainer').innerHTML = `
                    <div class="no-results">
                        <h3>数据加载失败</h3>
                        <p>请确保CSV文件存在</p>
                    </div>
                `;
            }
        }
        
        // ==================== CSV解析函数 ====================
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const values = [];
                let current = '';
                let inQuotes = false;
                
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());
                
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index] || '';
                });
                
                result.push(obj);
            }
            
            return result;
        }
        
        // ==================== 工具函数 ====================
        function populateCountryList() {
            const datalist = document.getElementById('countryList');
            datalist.innerHTML = '';
            
            allCountries.forEach(country => {
                const option = document.createElement('option');
                option.value = country;
                datalist.appendChild(option);
            });
        }
        
        function calculateDimensions(length, width, height) {
            const l = parseFloat(length) || 0;
            const w = parseFloat(width) || 0;
            const h = parseFloat(height) || 0;
            
            const longestSide = Math.max(l, w, h);
            const girth = longestSide + 2 * (l + w + h - longestSide);
            const sumOfSides = l + w + h;
            const volume = l * w * h;
            
            return { longestSide, girth, sumOfSides, volume, hasDimensions: l > 0 || w > 0 || h > 0 };
        }
        
        function ceilToHalf(value) {
            return Math.ceil(value * 2) / 2;
        }
        
        function ceilToInt(value) {
            return Math.ceil(value);
        }
        
        // ==================== 核心匹配逻辑 ====================
        function findZoneInfo(country) {
            console.log(`🔍 查找国家: "${country}"`);
            
            let countryRow = table2Data.find(row => row['国家'] === country);
            
            if (!countryRow) {
                countryRow = table2Data.find(row => 
                    row['国家'].includes(country) || country.includes(row['国家'])
                );
            }
            
            if (countryRow) {
                const zoneCode = countryRow['分区'];
                const marketingFee = parseFloat(countryRow['营销费']) || 0;
                console.log(`   ✅ 找到分区: ${zoneCode}, 营销费: ¥${marketingFee}/kg`);
                return { zoneCode, marketingFee };
            } else {
                console.log(`   ❌ 未找到该国家的分区信息`);
                return null;
            }
        }
        
        function calculateTable1Rate(country, isFile, isElectric, weight, dimensions) {
            console.log(`\n📋 table1匹配...`);
            console.log(`   文件: ${isFile ? '是' : '否'}, 带电: ${isElectric ? '是' : '否'}`);
            
            const results = [];
            
            table1Data.forEach(row => {
                if (row['国家'] !== country) return;
                if (row['类型'] !== (isFile ? '文件' : '物品')) return;
                if (row['是否带电'] !== (isElectric ? '是' : '否')) return;
                
                console.log(`✅ 匹配: ${row['渠道']}`);
                
                // 检查尺寸限制（如果有尺寸）
                let chargeableWeight = weight;
                
                if (dimensions.hasDimensions) {
                    const limitLongestSide = parseFloat(row['尺寸限制（最长边不大于）(cm)']) || Infinity;
                    const limitGirth = parseFloat(row['尺寸限制（围长）(cm)']) || Infinity;
                    const limitSumOfSides = parseFloat(row['尺寸限制（三边和）(cm)']) || Infinity;
                    
                    if (dimensions.longestSide > limitLongestSide) return;
                    if (dimensions.girth > limitGirth) return;
                    if (dimensions.sumOfSides > limitSumOfSides) return;
                    
                    // 计泡逻辑：有计泡系数且满足计泡条件
                    const bubbleCondition = parseFloat(row['计泡条件（最长边大于）']) || 0;
                    const bubbleCoefficient = parseFloat(row['计泡系数']) || 0;
                    
                    if (bubbleCoefficient > 0 && dimensions.longestSide > bubbleCondition) {
                        const volumeWeight = dimensions.volume / bubbleCoefficient;
                        chargeableWeight = Math.max(volumeWeight, weight);
                    }
                }
                
                // 重量限制
                const weightLimit = parseFloat(row['重量限制（kg）']) || Infinity;
                if (chargeableWeight > weightLimit) return;
                
                // 计算运费
                const handlingFee = parseFloat(row['处理费']) || 0;
                const firstWeight = parseFloat(row['首重g']) || 0;
                const firstRate = parseFloat(row['首重资费']) || 0;
                const additionalWeight = parseFloat(row['续重g']) || 0;
                const additionalRate = parseFloat(row['续重资费']) || 0;
                
                const chargeableWeightG = chargeableWeight * 1000;
                let additionalTimes = 0;
                
                if (chargeableWeightG > firstWeight && additionalWeight > 0) {
                    additionalTimes = Math.ceil((chargeableWeightG - firstWeight) / additionalWeight);
                }
                
                let totalRate = handlingFee + firstRate + additionalTimes * additionalRate;
                const discount = parseFloat(row['最低折扣']) || 1;
                totalRate = totalRate * discount;
                
                // 折扣显示：无折扣时显示"无折扣"
                const discountText = discount < 1 ? `(${(discount * 10).toFixed(1)}折)` : '无折扣';
                
                results.push({
                    channel: row['渠道'],
                    rate: totalRate,
                    details: {
                        '渠道': row['渠道'],
                        '计费重': chargeableWeight.toFixed(2) + 'kg',
                        '原价': '¥' + (totalRate / discount).toFixed(2),
                        '折扣': discountText,
                        '总价': '¥' + totalRate.toFixed(2),
                        '备注': row['备注']
                    }
                });
            });
            
            return results;
        }
        
        function calculateTable3Rate(zoneInfo, isFile, isElectric, weight, dimensions) {
            const zoneCode = zoneInfo.zoneCode;
            const marketingFee = zoneInfo.marketingFee;
            
            console.log(`\n📋 table3匹配...`);
            console.log(`   文件: ${isFile ? '是' : '否'}, 带电: ${isElectric ? '是' : '否'}`);
            console.log(`   营销费: ¥${marketingFee}/kg`);
            console.log(`   table3数据总行数: ${table3Data.length}`);
            
            const results = [];
            
            // table3/table4 强制计泡：体积÷5000
            let chargeableWeight = weight;
            if (dimensions.hasDimensions) {
                const volumeWeight = dimensions.volume / 5000;
                chargeableWeight = Math.max(volumeWeight, weight);
                console.log(`   计泡: ${dimensions.volume} ÷ 5000 = ${volumeWeight.toFixed(2)}kg`);
                console.log(`   计费重: ${chargeableWeight.toFixed(2)}kg`);
            }
            
            // 使用计费重进行匹配（向上取整到0.5kg）
            const matchWeight = ceilToHalf(chargeableWeight);
            console.log(`   匹配重量: ${matchWeight}kg (计费重向上取整到0.5kg)`);
            
            // 计算营销费（不足1kg按1kg算）
            const marketingWeight = Math.ceil(chargeableWeight);
            const marketingCost = marketingFee * marketingWeight;
            console.log(`   营销费: ${marketingWeight}kg × ¥${marketingFee} = ¥${marketingCost}`);
            
            table3Data.forEach((row, index) => {
                const rowIsFile = row['是否文件'];
                const expectedIsFile = isFile ? '是' : '否';
                
                console.log(`   检查第${index + 1}行: ${row['渠道']}, 是否文件="${rowIsFile}", 期望="${expectedIsFile}"`);
                
                if (rowIsFile !== expectedIsFile) {
                    console.log(`   ❌ 文件类型不匹配: ${rowIsFile} ≠ ${expectedIsFile}`);
                    return;
                }
                
                if (row['是否带电'] !== (isElectric ? '是' : '否')) {
                    console.log(`   ❌ 带电类型不匹配`);
                    return;
                }
                
                // 使用计费重匹配，而不是实际重量
                if (parseFloat(row['重量']) !== matchWeight) {
                    console.log(`   ❌ 重量不匹配: ${row['重量']} ≠ ${matchWeight}`);
                    return;
                }
                
                console.log(`   ✅ 匹配成功: ${row['渠道']}`);
                
                const rate = parseFloat(row[zoneCode]);
                if (rate > 0) {
                    const baseRate = rate * (dimensions.hasDimensions ? chargeableWeight / matchWeight : 1);
                    const totalRate = baseRate + marketingCost;
                    
                    results.push({
                        channel: row['渠道'],
                        rate: totalRate,
                        details: {
                            '渠道': row['渠道'],
                            '计费重': chargeableWeight.toFixed(2) + 'kg',
                            '总价': '¥' + totalRate.toFixed(2),
                            '备注': row['备注']
                        }
                    });
                }
            });
            
            console.log(`   table3匹配结果: ${results.length}个`);
            return results;
        }
        
        function calculateTable4Rate(zoneInfo, isFile, isElectric, weight, dimensions) {
            const zoneCode = zoneInfo.zoneCode;
            const marketingFee = zoneInfo.marketingFee;
            
            console.log(`\n📋 table4匹配...`);
            console.log(`   文件: ${isFile ? '是' : '否'}, 带电: ${isElectric ? '是' : '否'}`);
            console.log(`   营销费: ¥${marketingFee}/kg`);
            console.log(`   table4数据总行数: ${table4Data.length}`);
            
            const results = [];
            
            // table3/table4 强制计泡：体积÷5000
            let chargeableWeight = weight;
            if (dimensions.hasDimensions) {
                const volumeWeight = dimensions.volume / 5000;
                chargeableWeight = Math.max(volumeWeight, weight);
                console.log(`   计泡: ${dimensions.volume} ÷ 5000 = ${volumeWeight.toFixed(2)}kg`);
                console.log(`   计费重: ${chargeableWeight.toFixed(2)}kg`);
            }
            
            // 使用计费重进行匹配（向上取整到整数kg）
            const matchWeight = ceilToInt(chargeableWeight);
            console.log(`   匹配重量: ${matchWeight}kg (计费重向上取整到整数)`);
            
            // 计算营销费（不足1kg按1kg算）
            const marketingWeight = Math.ceil(chargeableWeight);
            const marketingCost = marketingFee * marketingWeight;
            console.log(`   营销费: ${marketingWeight}kg × ¥${marketingFee} = ¥${marketingCost}`);
            
            table4Data.forEach((row, index) => {
                const startWeight = parseFloat(row['起始重量']);
                const endWeight = parseFloat(row['结束重量']);
                const rowIsFile = row['是否文件'];
                const rowIsElectric = row['是否带电'];
                
                console.log(`\n   检查第${index + 1}行: ${row['渠道']}`);
                console.log(`      起始重量: ${startWeight}kg, 结束重量: ${endWeight}kg`);
                console.log(`      是否文件: "${rowIsFile}", 期望: "${isFile ? '物品' : '物品'}"`);
                console.log(`      是否带电: "${rowIsElectric}", 期望: "${isElectric ? '是' : '否'}"`);
                
                // 检查文件类型
                const expectedFileType = isFile ? '物品' : '物品';
                if (rowIsFile !== expectedFileType) {
                    console.log(`      ❌ 文件类型不匹配: ${rowIsFile} ≠ ${expectedFileType}`);
                    return;
                }
                
                // 检查带电类型
                const expectedElectricType = isElectric ? '是' : '否';
                if (rowIsElectric !== expectedElectricType) {
                    console.log(`      ❌ 带电类型不匹配: ${rowIsElectric} ≠ ${expectedElectricType}`);
                    return;
                }
                
                // 使用计费重匹配重量区间
                if (startWeight > matchWeight || endWeight < matchWeight) {
                    console.log(`      ❌ 重量不在范围内: ${matchWeight}kg 不在 ${startWeight}-${endWeight}kg 之间`);
                    return;
                }
                
                console.log(`      ✅ 所有条件匹配成功！`);
                
                const ratePerKg = parseFloat(row[zoneCode]);
                if (ratePerKg > 0) {
                    const baseRate = ratePerKg * chargeableWeight;
                    const totalRate = baseRate + marketingCost;
                    
                    results.push({
                        channel: row['渠道'],
                        rate: totalRate,
                        details: {
                            '渠道': row['渠道'],
                            '计费重': chargeableWeight.toFixed(1) + 'kg',
                            '总价': '¥' + totalRate.toFixed(2),
                            '备注': row['备注']
                        }
                    });
                    console.log(`      添加结果: ${row['渠道']} - ¥${totalRate.toFixed(2)}`);
                } else {
                    console.log(`      ❌ 费率无效: ${ratePerKg}`);
                }
            });
            
            console.log(`   table4匹配结果: ${results.length}个`);
            return results;
        }
        
        // ==================== 显示结果 ====================
        function displayResults(results) {
            const container = document.getElementById('resultsContainer');
            
            if (results.length === 0) {
                container.innerHTML = '<div class="no-results">未找到符合条件的报价</div>';
                return;
            }
            
            results.sort((a, b) => a.rate - b.rate);
            
            let html = '';
            results.forEach(result => {
                html += `
                <div class="result-card">
                    <div class="result-header">
                        <div class="channel-name">${result.channel}</div>
                        <div class="price">${result.details['总价']}</div>
                    </div>
                    <div class="result-details">
                `;
                
                // 只显示前4个关键信息，确保不超过2行
                const detailKeys = Object.keys(result.details).filter(key => key !== '总价');
                const displayKeys = detailKeys.slice(0, 4); // 最多显示4个项目
                
                displayKeys.forEach(key => {
                    const value = result.details[key];
                    const isNoDiscount = key === '折扣' && value === '无折扣';
                    html += `
                        <div class="detail-item">
                            <span class="detail-label">${key}</span>
                            <span class="detail-value ${isNoDiscount ? 'no-discount' : ''}">${value}</span>
                        </div>
                    `;
                });
                
                html += `
                    </div>
                </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // ==================== 主查询函数 ====================
        function performQuery() {
            console.clear();
            console.log('🚀 开始查询...');
            
            const country = document.getElementById('country').value.trim();
            const weight = parseFloat(document.getElementById('weight').value);
            const isFile = document.getElementById('isFile').checked;
            const isElectric = document.getElementById('isElectric').checked;
            const length = document.getElementById('length').value;
            const width = document.getElementById('width').value;
            const height = document.getElementById('height').value;
            
            console.log(`📦 查询参数:`);
            console.log(`   国家: ${country}`);
            console.log(`   重量: ${weight}kg`);
            console.log(`   文件: ${isFile ? '是' : '否'}`);
            console.log(`   带电: ${isElectric ? '是' : '否'}`);
            console.log(`   尺寸: ${length}×${width}×${height}cm`);
            
            if (!country) {
                alert('请输入国家/地区');
                return;
            }
            
            if (isNaN(weight) || weight <= 0) {
                alert('请输入有效重量');
                return;
            }
            
            document.getElementById('loadingIndicator').style.display = 'block';
            document.getElementById('resultsContainer').innerHTML = '';
            
            setTimeout(() => {
                const dimensions = calculateDimensions(length, width, height);
                console.log(`📐 有尺寸: ${dimensions.hasDimensions}`);
                
                const zoneInfo = findZoneInfo(country);
                if (!zoneInfo) {
                    document.getElementById('loadingIndicator').style.display = 'none';
                    document.getElementById('resultsContainer').innerHTML = '<div class="no-results">未找到该国家的分区信息</div>';
                    return;
                }
                
                let allResults = [];
                
                const table1Results = calculateTable1Rate(country, isFile, isElectric, weight, dimensions);
                allResults = allResults.concat(table1Results);
                
                const table3Results = calculateTable3Rate(zoneInfo, isFile, isElectric, weight, dimensions);
                allResults = allResults.concat(table3Results);
                
                const table4Results = calculateTable4Rate(zoneInfo, isFile, isElectric, weight, dimensions);
                allResults = allResults.concat(table4Results);
                
                document.getElementById('loadingIndicator').style.display = 'none';
                displayResults(allResults);
                
                console.log(`✅ 完成！找到 ${allResults.length} 个报价`);
            }, 300);
        }
        
        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            // 设置水印
            setWatermark();
            
            loadCSVFiles();
            
            document.getElementById('queryBtn').addEventListener('click', performQuery);
            
            // 添加点击测试
            document.getElementById('isFile').addEventListener('change', function() {
                console.log('文件选项改变:', this.checked);
            });
            
            document.getElementById('isElectric').addEventListener('change', function() {
                console.log('带电选项改变:', this.checked);
            });
            
            // 默认示例
            document.getElementById('country').value = '美国';
        });
    </script>
</body>
</html>
