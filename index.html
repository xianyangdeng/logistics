<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国际物流询价系统</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-shipping-fast"></i> 国际物流询价系统</h1>
            <p class="subtitle">请输入货物信息获取实时报价</p>
        </header>

        <!-- CSV文件上传区域 -->
        <div class="csv-upload-section">
            <h2><i class="fas fa-file-upload"></i> 上传报价数据文件</h2>
            <p class="note">首次使用请上传4个CSV文件，之后浏览器会自动缓存数据</p>
            
            <div class="upload-grid">
                <div class="upload-item">
                    <label for="table1">table1.csv (基础运费表)</label>
                    <input type="file" id="table1" accept=".csv" class="csv-input">
                    <div class="upload-status" id="status1">等待上传</div>
                </div>
                
                <div class="upload-item">
                    <label for="table2">table2.csv (国家分区表)</label>
                    <input type="file" id="table2" accept=".csv" class="csv-input">
                    <div class="upload-status" id="status2">等待上传</div>
                </div>
                
                <div class="upload-item">
                    <label for="table3">table3.csv (分区运费表)</label>
                    <input type="file" id="table3" accept=".csv" class="csv-input">
                    <div class="upload-status" id="status3">等待上传</div>
                </div>
                
                <div class="upload-item">
                    <label for="table4">table4.csv (重量段运费表)</label>
                    <input type="file" id="table4" accept=".csv" class="csv-input">
                    <div class="upload-status" id="status4">等待上传</div>
                </div>
            </div>
            
            <div class="upload-actions">
                <button id="loadDefaultBtn" class="btn-secondary">
                    <i class="fas fa-database"></i> 使用示例数据
                </button>
                <button id="clearCacheBtn" class="btn-danger">
                    <i class="fas fa-trash"></i> 清除缓存
                </button>
            </div>
        </div>

        <!-- 查询表单 -->
        <div class="main-content">
            <div class="form-section">
                <h2><i class="fas fa-search"></i> 货物信息查询</h2>
                <form id="quoteForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="country"><i class="fas fa-globe"></i> 目的国家/地区 *</label>
                            <select id="country" required disabled>
                                <option value="">请先上传CSV文件</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="weight"><i class="fas fa-weight-hanging"></i> 重量 (kg) *</label>
                            <input type="number" id="weight" step="0.01" min="0.01" max="100" required placeholder="例如：2.5">
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-bolt"></i> 是否带电</label>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="isElectric" value="是" checked>
                                    <span class="radio-custom"></span> 是
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="isElectric" value="否">
                                    <span class="radio-custom"></span> 否
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-file-alt"></i> 是否文件</label>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="isDocument" value="是" checked>
                                    <span class="radio-custom"></span> 是
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="isDocument" value="否">
                                    <span class="radio-custom"></span> 否
                                </label>
                            </div>
                        </div>

                        <div class="form-group dimensions">
                            <label><i class="fas fa-ruler-combined"></i> 尺寸 (cm)</label>
                            <div class="dimensions-inputs">
                                <input type="number" id="length" placeholder="长" min="1" max="200">
                                <span>×</span>
                                <input type="number" id="width" placeholder="宽" min="1" max="200">
                                <span>×</span>
                                <input type="number" id="height" placeholder="高" min="1" max="200">
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="submitBtn" disabled>
                            <i class="fas fa-search"></i> 查询报价
                        </button>
                        <button type="reset" class="btn-secondary">
                            <i class="fas fa-redo"></i> 重置
                        </button>
                    </div>
                </form>
            </div>

            <!-- 结果区域 -->
            <div class="results-section">
                <h2><i class="fas fa-list-alt"></i> 报价结果</h2>
                <div id="loadingIndicator" class="loading hidden">
                    <div class="spinner"></div>
                    <p>正在查询报价，请稍候...</p>
                </div>
                
                <div id="resultsContainer" class="hidden">
                    <div class="results-header">
                        <div class="search-summary">
                            <p><strong>查询条件：</strong> 
                                <span id="summaryCountry"></span> | 
                                <span id="summaryWeight"></span> kg | 
                                带电: <span id="summaryElectric"></span> | 
                                文件: <span id="summaryDocument"></span>
                            </p>
                        </div>
                        <div class="sort-options">
                            <label for="sortBy">排序方式：</label>
                            <select id="sortBy">
                                <option value="priceAsc">价格从低到高</option>
                                <option value="priceDesc">价格从高到低</option>
                                <option value="channel">按渠道名称</option>
                            </select>
                        </div>
                    </div>

                    <div class="table-container">
                        <table id="resultsTable">
                            <thead>
                                <tr>
                                    <th>渠道名称</th>
                                    <th>类型</th>
                                    <th>运费 (CNY)</th>
                                    <th>备注</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="resultsBody">
                                <!-- 动态填充结果 -->
                            </tbody>
                        </table>
                    </div>

                    <div class="no-results hidden" id="noResults">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>未找到符合条件的报价，请调整查询条件。</p>
                    </div>
                </div>

                <div id="emptyState" class="empty-state">
                    <i class="fas fa-box-open"></i>
                    <p>请先上传CSV数据文件，然后输入查询条件获取报价</p>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2024 国际物流询价系统 | 数据更新时间：<span id="updateTime"></span></p>
        </footer>
    </div>

    <script src="js/papaparse.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
